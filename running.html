<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态综合看板 - 极简现代</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #faf8f5; /* 北欧风奶油底色 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #2c3e50;
            margin: 0;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 840px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
        }
        header p {
            color: #8a9597;
            font-size: 13px;
            margin: 0;
        }
        
        /* 组合图表大卡片 */
        .dashboard-card {
            background: #ffffff;
            border: 1px solid #eeebe5;
            border-radius: 6px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(7, 5, 0, 0.015);
            margin-bottom: 30px;
        }
        .chart-row {
            position: relative;
            width: 100%;
            height: 200px;
        }
        .divider {
            height: 1px;
            background-color: #f5f2ec;
            margin: 20px 0;
        }

        /* 北欧极简现代数据列表样式 */
        .list-section {
            background: #ffffff;
            border: 1px solid #eeebe5;
            border-radius: 6px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(7, 5, 0, 0.015);
        }
        .list-title {
            font-size: 15px;
            font-weight: 400;
            color: #1a252f;
            margin: 0 0 20px 0;
            letter-spacing: 0.5px;
        }
        .activity-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .activity-table th {
            font-weight: 400;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a0aab0;
            padding-bottom: 12px;
            border-bottom: 1px solid #e6dfd7;
        }
        .activity-table td {
            padding: 10px 0;
            border-bottom: 1px solid #f5f2ec; /* 极淡分割线 */
            color: #34495e;
            font-weight: 300;
        }
        .activity-table tr:last-child td {
            border-bottom: none; /* 移除最后一行的底线 */
        }
        /* 对齐规范：文本靠左，数字靠右 */
        .text-left { text-align: left; }
        .text-right { text-align: right; }
        
        /* 辅助高亮与弱化效果 */
        .run-title { color: #2c3e50; font-weight: 400; }
        .km-val { font-weight: 500; color: #1a252f; }
        .time-secondary { color: #b2bec3; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>身体成分与运动负荷综合看板</h1>
        <p>多维数据垂直联动分析 · 跨越时间周期的体能蜕变</p>
    </header>

    <div class="dashboard-card">
        <div class="chart-row">
            <canvas id="bodyChart"></canvas>
        </div>
        <div class="divider"></div>
        <div class="chart-row">
            <canvas id="runningChart"></canvas>
        </div>
    </div>

    <div class="list-section">
        <h2 class="list-title">历史跑步足迹</h2>
        <table class="activity-table">
            <thead>
                <tr>
                    <th class="text-left">活动</th>
                    <th class="text-right">KM</th>
                    <th class="text-right">Pace</th>
                    <th class="text-right">BPM</th>
                    <th class="text-right">Time</th>
                    <th class="text-right">Date</th>
                </tr>
            </thead>
            <tbody id="activityListBody">
                </tbody>
        </table>
    </div>
</div>

<script>
// 统一的全局时间轴
const timeline = [
    "2025-11-03", "2025-11-14", "2025-11-18", "2025-11-20", "2025-12-03", 
    "2025-12-10", "2025-12-23", "2026-01-05", "2026-01-06", "2026-01-07", 
    "2026-01-08", "2026-01-09", "2026-01-10", "2026-01-13", "2026-01-14", 
    "2026-01-20", "2026-01-22", "2026-01-23", "2026-01-28", "2026-04-27", 
    "2026-05-12", "2026-05-13", "2026-05-19", "2026-05-20"
];

// 图表所需的数据空槽位
const weightData = Array(timeline.length).fill(null);
const fatData = Array(timeline.length).fill(null);
const distanceData = Array(timeline.length).fill(null);
const hrData = Array(timeline.length).fill(null);

// 模拟未来的真实全量跑步列表数据数据（此处包含具体的时间点与活动名称）
const rawRunningList = [
    { "name": "清晨跑步", "km": 6.54, "pace": "7'01\"", "bpm": 129, "time": "45min", "datetime": "2026-05-20 06:30:38" },
    { "name": "清晨跑步", "km": 10.03, "pace": "3'21\"", "bpm": 127, "time": "62min", "datetime": "2026-05-19 05:49:51" },
    { "name": "清晨跑步", "km": 7.62, "pace": "6'06\"", "bpm": 134, "time": "46min", "datetime": "2026-05-13 06:24:59" },
    { "name": "清晨跑步", "km": 7.13, "pace": "6'54\"", "bpm": 132, "time": "49min", "datetime": "2026-05-12 06:28:06" },
    { "name": "夜晚跑步", "km": 0.83, "pace": "16'28\"", "bpm": 109, "time": "10min", "datetime": "2026-04-27 22:06:12" },
    { "name": "傍晚跑步", "km": 0.26, "pace": "16'39\"", "bpm": 166, "time": "3min", "datetime": "2026-04-27 21:44:08" },
    { "name": "傍晚跑步", "km": 0.85, "pace": "15'04\"", "bpm": 148, "time": "10min", "datetime": "2026-04-27 21:06:25" },
    { "name": "傍晚跑步", "km": 0.52, "pace": "9'03\"", "bpm": 132, "time": "4min", "datetime": "2026-04-27 20:02:29" },
    { "name": "清晨跑步", "km": 7.55, "pace": "5'16\"", "bpm": 126, "time": "39min", "datetime": "2026-01-28 06:54:29" },
    { "name": "清晨跑步", "km": 12.52, "pace": "4'47\"", "bpm": 133, "time": "60min", "datetime": "2026-01-23 06:33:44" },
    { "name": "清晨跑步", "km": 10.12, "pace": "4'57\"", "bpm": 131, "time": "49min", "datetime": "2026-01-22 06:50:49" },
    { "name": "清晨跑步", "km": 10.42, "pace": "5'07\"", "bpm": 132, "time": "52min", "datetime": "2026-01-20 06:35:02" },
    { "name": "傍晚跑步", "km": 6.34, "pace": "5'22\"", "bpm": 146, "time": "33min", "datetime": "2026-01-14 20:19:44" },
    { "name": "清晨跑步", "km": 6.42, "pace": "5'08\"", "bpm": 131, "time": "32min", "datetime": "2026-01-14 06:00:33" },
    { "name": "清晨跑步", "km": 16.26, "pace": "5'20\"", "bpm": 132, "time": "86min", "datetime": "2026-01-13 05:37:00" },
    { "name": "局后跑步", "km": 8.37, "pace": "6'42\"", "bpm": 137, "time": "54min", "datetime": "2026-01-10 16:23:23" },
    { "name": "清晨跑步", "km": 11.26, "pace": "5'19\"", "bpm": 135, "time": "59min", "datetime": "2026-01-09 06:45:23" },
    { "name": "清晨跑步", "km": 7.67, "pace": "5'54\"", "bpm": 128, "time": "45min", "datetime": "2026-01-08 07:05:05" },
    { "name": "清晨跑步", "km": 6.44, "pace": "5'27\"", "bpm": 133, "time": "34min", "datetime": "2026-01-07 06:33:04" },
    { "name": "清晨跑步", "km": 11.50, "pace": "5'31\"", "bpm": 134, "time": "63min", "datetime": "2026-01-06 06:55:00" },
    { "name": "清晨跑步", "km": 5.11, "pace": "6'18\"", "bpm": 124, "time": "32min", "datetime": "2026-01-05 06:53:39" }
];

// 对应图表中的静态身体成分数据
const rawBody = [
    {"date": "2025-11-03", "w": 82.6, "f": 28.7}, {"date": "2025-11-14", "w": 79.7, "f": 26.2},
    {"date": "2025-11-18", "w": 79.3, "f": 25.2}, {"date": "2025-11-20", "w": 79.1, "f": 23.5},
    {"date": "2025-12-03", "w": 78.7, "f": 24.3}, {"date": "2025-12-10", "w": 76.5, "f": 22.2},
    {"date": "2025-12-23", "w": 76.9, "f": 20.2}, {"date": "2026-01-05", "w": 76.8, "f": 20.6},
    {"date": "2026-01-13", "w": 75.9, "f": 22.9}, {"date": "2026-01-20", "w": 75.6, "f": 21.1},
    {"date": "2026-01-28", "w": 75.6, "f": 23.2}, {"date": "2026-05-19", "w": 77.0, "f": 21.6}
];

// --- ⚡ 数据解析引擎逻辑开始 ---
// 1. 自动映射填充图表数据
rawBody.forEach(d => { const idx = timeline.indexOf(d.date); if(idx!==-1){ weightData[idx]=d.w; fatData[idx]=d.f; } });
rawRunningList.forEach(d => {
    const shortDate = d.datetime.split(' ')[0]; // 提取 YYYY-MM-DD
    const idx = timeline.indexOf(shortDate);
    if(idx !== -1) {
        distanceData[idx] = d.km;
        hrData[idx] = d.bpm;
    }
});

// 2. ⚡ 动态流式渲染 HTML 列表
const listContainer = document.getElementById('activityListBody');
let listHtml = '';
rawRunningList.forEach(item => {
    const dateParts = item.datetime.split(' '); // 分割日期与具体时间
    listHtml += `
        <tr>
            <td class="text-left run-title">${item.name}</td>
            <td class="text-right km-val">${item.km.toFixed(2)}</td>
            <td class="text-right">${item.pace}</td>
            <td class="text-right">${item.bpm}</td>
            <td class="text-right">${item.time}</td>
            <td class="text-right">${dateParts[0]}<span class="time-secondary">${dateParts[1].substring(0,5)}</span></td>
        </tr>
    `;
});
listContainer.innerHTML = listHtml;
// --- 数据解析逻辑结束 ---

// --- 📊 Chart.js 初始化配置 (保持前面的极简标准配置) ---
const commonScalesX = { grid: { display: false }, ticks: { color: '#a0aab0', font: { size: 10, weight: 300 }, maxTicksLimit: 8, maxRotation: 0 }, border: { display: false } };

const chartBody = new Chart(document.getElementById('bodyChart').getContext('2d'), {
    type: 'line',
    data: {
        labels: timeline,
        datasets: [
            { label: '体重', data: weightData, borderColor: '#5c768d', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 1.5, spanGaps: true, tension: 0.4, yAxisID: 'yW' },
            { label: '体脂率', data: fatData, borderColor: '#c4a475', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 1.5, spanGaps: true, tension: 0.4, yAxisID: 'yF' }
        ]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', align: 'end', labels: { boxWidth: 6, usePointStyle: true, font: { size: 11 } } } },
        scales: {
            x: { ...commonScalesX, ticks: { display: false } },
            yW: { type: 'linear', position: 'left', min: 70, max: 85, ticks: { color: '#a0aab0', font: { size: 10 }, stepSize: 5, callback: v => v+' kg' }, grid: { color: '#f2eee9' }, border: { display: false } },
            yF: { type: 'linear', position: 'right', min: 15, max: 35, ticks: { color: '#a0aab0', font: { size: 10 }, stepSize: 5, callback: v => v+' %' }, grid: { display: false }, border: { display: false } }
        }
    }
});

const chartRunning = new Chart(document.getElementById('runningChart').getContext('2d'), {
    data: {
        labels: timeline,
        datasets: [
            { type: 'bar', label: '跑步距离', data: distanceData, backgroundColor: 'rgba(92, 118, 141, 0.4)', hoverBackgroundColor: 'rgba(92, 118, 141, 0.7)', barThickness: 6, yAxisID: 'yDistance' },
            { type: 'line', label: '平均心率', data: hrData, borderColor: '#db8a75', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 1.5, spanGaps: true, tension: 0.4, yAxisID: 'yH' }
        ]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', align: 'end', labels: { boxWidth: 6, usePointStyle: true, font: { size: 11 } } }, tooltip: { usePointStyle: true } },
        scales: {
            x: commonScalesX,
            yDistance: { type: 'linear', position: 'left', min: 0, max: 20, ticks: { color: '#a0aab0', font: { size: 10 }, stepSize: 5, callback: v => v+' km' }, grid: { color: '#f2eee9' }, border: { display: false } },
            yH: { type: 'linear', position: 'right', min: 110, max: 160, ticks: { color: '#a0aab0', font: { size: 10 }, stepSize: 10, callback: v => v+' bpm' }, grid: { display: false }, border: { display: false } }
        }
    }
});

// 鼠标悬停多图表垂直十字联动
function triggerHover(targetChart, event) {
    const points = targetChart.getElementsAtEventForMode(event, 'index', { intersect: false }, true);
    if (points.length > 0) { targetChart.setActiveElements(points); targetChart.tooltip.setActiveElements(points, { x: event.x, y: event.y }); targetChart.update('none'); }
}
document.getElementById('bodyChart').addEventListener('mousemove', (e) => { triggerHover(chartRunning, chartBody.helpers.getRelativePosition(e, chartBody)); });
document.getElementById('runningChart').addEventListener('mousemove', (e) => { triggerHover(chartBody, chartRunning.helpers.getRelativePosition(e, chartRunning)); });
</script>
</body>
</html>
