name: Sync Garmin Data

on:
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = 北京时间凌晨 0:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install garth

      - name: Sync Garmin running data
        env:
          GARMIN_SECRET: ${{ secrets.GARMIN_SECRET }}
        run: python scripts/sync_garmin.py

      - name: Commit running data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add running-data/activities.json
          git diff --cached --quiet || git commit -m "chore: sync garmin running data"
          git push
